openapi: 3.0.0
info:
  title: 文件微服务提供的API接口文档
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/file-server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 网关验证Token后会在Header中注入 X-User-Id

  parameters:
    XUserId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
      description: 网关从Token解析后注入的用户ID（客户端无需传递）

paths:
  # ==================== 下载文件 ====================
  /files/{fileId}:
    get:
      operationId: downloadFile
      description: 根据文件ID下载文件（需要认证）
      security:
        - BearerAuth: [ ]
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          description: 文件ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                properties:
                  success:
                    type: boolean
                    description: 是否成功
                  data:
                    type: object
                    properties:
                      fileData:
                        type: string
                        description: Base64编码的文件数据
                  errCode:
                    type: string
                    description: 错误码
                    enum:
                      - "FILE_NOT_FOUND"
                      - "UNKNOWN_ERROR"
                  errMsg:
                    type: string
                    description: 错误信息